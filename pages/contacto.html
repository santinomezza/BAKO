
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto | BAKO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">
  <div class="logo">
    <h1><a href="index.html">BAKO</a></h1>
  </div>
  <nav class="nav">
    <ul>
      <li class="enlaces-header"><a href="../index.html#destacados">DESTACADOS</a></li>
      <li class="enlaces-header"><a href="../index.html#catalogo">GORRAS</a></li>
      <li class="enlaces-header"><a href="../index.html#nosotros">NOSOTROS</a></li>
      <li class="enlaces-header"><a href="contacto.html">CONTACTO</a></li>
    </ul>
  </nav>
</header>

<section class="contact-hero">
  <h2>Contacto</h2>
  <p>Estamos listos para escucharte</p>
</section>

<section class="contact-section">

  <div class="contact-container">

    <!-- FORMULARIO -->
    <div class="contact-form">
      <h3>Enviános un mensaje</h3>

<form id="form-contacto">
<input type="text" id="nombre" placeholder="Nombre " required>
<input type="text" id="apellido" placeholder="Apellido" required>
<input type="email" id="email" placeholder="Email" required>
<input type="text" id="asunto" placeholder="Asunto">
<textarea id="mensaje" placeholder="Escribí tu mensaje..." required></textarea>
        <button type="submit">Enviar mensaje</button>
      </form>
    </div>

    <!-- INFO -->
    <div class="contact-info">
      <h3>Información</h3>

      <p><i class="fas fa-map-marker-alt"></i> Buenos Aires, Argentina</p>
      <p><i class="fas fa-envelope"></i> bakolifestyle@gmail.com</p>
      <p><i class="fab fa-whatsapp"></i> +54 9 3518 65-1885</p>

      <div class="contact-social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-spotify"></i></a>
      </div>
    </div>

  </div>

</section>




<script>
document.getElementById("form-contacto").addEventListener("submit", function(e) {
  e.preventDefault();

  const nombre = document.getElementById("nombre").value;
  const apellido = document.getElementById("apellido").value;
  const email = document.getElementById("email").value;
  const asunto = document.getElementById("asunto").value;
  const mensaje = document.getElementById("mensaje").value;

  const numero = "5493834340335"; 

  const texto = `Hola! 👋

📌 *Nuevo mensaje desde BAKO*

👤 Nombre: ${nombre}
📧 Email: ${email}
📝 Asunto: ${asunto}

💬 Mensaje:
${mensaje}
`;

  const url = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;

  window.open(url, "_blank");
});
</script>
</body>
</html>
