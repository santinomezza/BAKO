
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Contacto | BAKO</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<header class="header">
  <h1>BAKO</h1>
</header>

<section class="contact-hero">
  <h2>Contacto</h2>
  <p>Estamos listos para escucharte</p>
</section>

<section class="contact-section">

  <div class="contact-container">

    <!-- FORMULARIO -->
    <div class="contact-form">
      <h3>Enviános un mensaje</h3>

      <form>
        <input type="text" placeholder="Nombre completo" required>
        <input type="email" placeholder="Email" required>
        <input type="text" placeholder="Asunto">
        <textarea placeholder="Escribí tu mensaje..." required></textarea>
        <button type="submit">Enviar mensaje</button>
      </form>
    </div>

    <!-- INFO -->
    <div class="contact-info">
      <h3>Información</h3>

      <p><i class="fas fa-map-marker-alt"></i> Buenos Aires, Argentina</p>
      <p><i class="fas fa-envelope"></i> bakolifestyle@gmail.com</p>
      <p><i class="fab fa-whatsapp"></i> +54 9 3518 65-1885</p>

      <div class="contact-social">
        <a href="#"><i class="fab fa-instagram"></i></a>
        <a href="#"><i class="fab fa-tiktok"></i></a>
        <a href="#"><i class="fab fa-spotify"></i></a>
      </div>
    </div>

  </div>

</section>

</body>
</html>
